<!DOCTYPE html>
<html class="light" lang="ja">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { 
                        "primary": {
                            DEFAULT: "#1e40af", // より落ち着いたインディゴブルー
                            50: "#f0f9ff",
                            100: "#e0f2fe",
                            200: "#bae6fd",
                            300: "#7dd3fc",
                            400: "#38bdf8",
                            500: "#0ea5e9",
                            600: "#0284c7",
                            700: "#0369a1",
                            800: "#075985",
                            900: "#0c4a6e",
                        }, 
                        "background-light": "#f8fafc", 
                        "background-dark": "#020617" 
                    },
                    fontFamily: { 
                        "sans": ["Noto Sans JP", "system-ui", "-apple-system", "sans-serif"] 
                    },
                },
            },
        }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        body {
            font-feature-settings: "palt";
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
    <title>大垣市情報工房 | 料金シミュレーター</title>
</head>

<body class="bg-background-light dark:bg-background-dark font-sans text-slate-800 dark:text-slate-100 min-h-screen">
    
    <!-- ヘッダー -->
    <header class="sticky top-0 z-50 w-full bg-white dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 shadow-sm">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-3">
                <div class="size-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-md">
                    <svg class="size-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m-1 4h1m5-12h1m-1 4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-base sm:text-xl font-bold tracking-tight text-slate-900 dark:text-white">大垣市情報工房</h1>
                    <p class="text-[10px] sm:text-[11px] font-bold text-slate-500">施設利用料金シミュレーター</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <a href="legal.html" class="flex items-center gap-2 px-3 sm:px-4 py-2 rounded-xl border-2 border-slate-200 dark:border-slate-800 text-xs sm:text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 hover:border-primary hover:text-primary transition-all shadow-sm">
                    <span class="hidden sm:inline">利用規約・免責事項</span>
                    <span class="sm:hidden">利用規約</span>
                </a>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-10">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- 左側：設定エリア -->
            <div class="flex-1 space-y-8 min-w-0">
                
                <!-- セクション1: 施設選択 -->
                <section class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 p-6 sm:p-8 shadow-sm">
                    <div class="flex items-center justify-between mb-8 gap-4">
                        <h2 class="flex items-center gap-3 text-lg font-bold text-slate-900 dark:text-white">
                            <span class="bg-primary w-1.5 h-6 rounded-full"></span>
                            施設を選択してください
                        </h2>
                        <button id="reset-inputs-btn" class="px-3 py-1.5 rounded-lg bg-red-50 text-red-600 text-xs font-black hover:bg-red-100 transition-all shadow-sm">
                            入力をクリア
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="room-buttons">
                        <!-- ボタンはJSで生成されたものと競合しないよう、初期表示としてHTMLに記述 -->
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="スインクホール">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">スインクホール</span>
                            <span class="text-xs text-slate-500 font-medium">定員: 452人</span>
                        </button>
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="セミナー室">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">セミナー室</span>
                            <span class="text-xs text-slate-500 font-medium">定員: 80人</span>
                        </button>
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="研修室">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">研修室</span>
                            <span class="text-xs text-slate-500 font-medium">定員: 12人</span>
                        </button>
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="多目的研修室">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">多目的研修室</span>
                            <span class="text-xs text-slate-500 font-medium">定員: 50人</span>
                        </button>
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="会議室１">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">会議室１</span>
                            <span class="text-xs text-slate-500 font-medium">定員: 12人</span>
                        </button>
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="会議室２">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">会議室２</span>
                            <span class="text-xs text-slate-500 font-medium">定員: 12人</span>
                        </button>
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="会議室３">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">会議室３</span>
                            <span class="text-xs text-slate-500 font-medium">定員: 36人</span>
                        </button>
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="会議室４">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">会議室４</span>
                            <span class="text-xs text-slate-500 font-medium">定員: 60人</span>
                        </button>
                        <button class="sim-room-btn group flex flex-col gap-2 rounded-2xl border-2 border-slate-100 dark:border-slate-800 p-5 text-left transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50" data-room="創作コーナー">
                            <span class="text-sm font-bold text-slate-800 dark:text-slate-100 group-hover:text-primary transition-colors">創作コーナー</span>
                            <span class="text-xs text-slate-500 font-medium">時間貸し</span>
                        </button>
                    </div>
                </section>

                <!-- JSで挿入される動的設定エリア -->
                <div id="room-configs-container" class="space-y-8 min-w-0"></div>
            </div>

            <!-- 右側：結果パネル -->
            <div class="w-full lg:w-96">
                <div class="sticky top-28 space-y-6">
                    <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-xl shadow-slate-200/40 dark:shadow-none">
                        <div class="bg-slate-900 dark:bg-slate-800 px-6 py-5 text-white">
                            <h3 class="font-bold flex items-center gap-2">
                                見積結果（概算）
                            </h3>
                        </div>
                        <div class="p-6">
                            <dl class="space-y-6">
                                <div class="flex flex-col gap-1.5 pb-4 border-b border-slate-100 dark:border-slate-800">
                                    <dt class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">選択中の施設</dt>
                                    <dd class="text-base font-bold text-slate-900 dark:text-white" id="sim-room-name">未選択</dd>
                                </div>
                                <div id="sim-details-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 scrollbar-hide text-sm">
                                    <!-- JSで挿入 -->
                                </div>
                                <div class="pt-6 border-t-2 border-dashed border-slate-100 dark:border-slate-800 flex flex-col items-end gap-1">
                                    <span class="text-xs font-bold text-slate-500 text-right">合計金額 (税込)</span>
                                    <span class="text-3xl font-black text-primary tracking-tight" id="sim-total-price">¥0</span>
                                </div>
                            </dl>
                            
                            <div class="mt-8">
                                <button id="copy-estimate-btn" class="flex w-full items-center justify-center gap-2 rounded-2xl bg-primary py-4 text-sm font-bold text-white hover:bg-primary-700 transition-all shadow-lg shadow-primary/20 active:scale-[0.98]">
                                    結果をコピーする
                                </button>
                            </div>
                            
                            <div class="mt-6 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-800 flex gap-3 text-slate-500">
                                <p class="text-[11px] font-medium leading-relaxed">
                                    【ご注意】 この見積もりは規程に基づく概算です。正確な料金は窓口での本申請時に確定いたします。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- モバイル用合計バー -->
    <div id="mobile-total-bar" class="lg:hidden fixed bottom-6 left-4 right-4 z-50 translate-y-24 transition-transform duration-300">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 p-4 flex items-center justify-between overflow-hidden relative">
            <div class="relative z-10">
                <span class="text-[10px] font-bold text-slate-400 block mb-0.5">見積合計（税込）</span>
                <span class="text-2xl font-black text-primary" id="mobile-total-price">¥0</span>
            </div>
            <button id="mobile-scroll-to-result" class="relative z-10 bg-primary text-white px-5 py-3 rounded-xl font-bold text-sm shadow-lg shadow-primary/20">
                明細を確認
            </button>
        </div>
    </div>

    <script src="app.js?v=4.0"></script>
</body>

</html>
